<!DOCTYPE html>
<html>
<head>
  <title>Full Stack Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Full Stack Dashboard</h1>

<button onclick="show('exp1')">API Fetch</button>
<button onclick="show('exp2')">Redux Cart</button>
<button onclick="show('exp3')">Chat</button>

<!-- EXP 1 -->
<div id="exp1" class="section">
  <h2>Axios API Simulation</h2>
  <button onclick="fetchProducts()">Fetch Products</button>
  <div id="products"></div>
</div>

<!-- EXP 2 -->
<div id="exp2" class="section">
  <h2>Redux Cart</h2>
  <button onclick="addItem()">Add Item</button>
  <div id="cart"></div>
</div>

<!-- EXP 3 -->
<div id="exp3" class="section">
  <h2>Chat System</h2>
  <input id="msg" placeholder="Type message">
  <button onclick="sendMessage()">Send</button>
  <div id="chat"></div>
</div>

<script src="script.js"></script>
</body>
</html>
